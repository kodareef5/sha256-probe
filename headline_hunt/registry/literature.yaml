- id: li_liu_wang_dong_sun_asiacrypt_2024_31step_practical
  citation: "Yingxin Li, Fukang Liu, Gaoli Wang, Xiaoyang Dong, Siwei Sun \u2014 The First Practical Collision for 31-Step SHA-256"
  year: 2024
  venue: ASIACRYPT 2024 (best paper award; Springer LNCS 15494)
  url: https://link.springer.com/chapter/10.1007/978-981-96-0941-3_8
  arxiv_or_eprint: pending \u2014 Springer/proceedings only so far
  confidence: high
  relevance: |
    Memory-efficient improvement of Li-Liu-Wang EUROCRYPT 2024 enabling the
    first PRACTICAL (full, not just SFS) 31-step SHA-256 colliding message
    pair, found in 1.2h with 64 threads and negligible memory. Time and memory
    complexity for 31-step SHA-512 also improved by factors 2^20.9 and 2^42.1
    respectively. Cross-cite for any block2_wang writeup that compares
    methodology footprints. The project's cascade-1 work at sr=60+ is in a
    much deeper-rounds regime than 31-step, but the memory-efficient search
    direction is the relevant one for block2_wang's single-machine budget.
  read_status: read
  key_takeaway: |
    [STRUCTURAL_SUMMARY] Li-Liu-Wang-Dong-Sun (ASIACRYPT 2024 best paper) follow
    on Li-Liu-Wang EUROCRYPT 2024. Where the EUROCRYPT paper achieved 39-step
    SFS at 2^49.8 time / 2^48 memory, the ASIACRYPT paper makes the 31-step
    full collision PRACTICAL via memory-efficient search (1.2h \u00d7 64 threads,
    negligible memory). This is the deepest practical full SHA-256 collision
    known. The technique generalizes to SHA-512 with similarly large
    improvements. For block2_wang, the relevant methodological lesson is the
    memory-efficient search trick rather than the trail-search itself \u2014 the
    project's sr=60/61 work is at much deeper rounds (60+) where trail search
    is already documented to stall (Li-Liu-Wang abstract).
  action_items:
  - "[DONE] Verify authors and venue \u2014 Li-Liu-Wang-Dong-Sun, ASIACRYPT 2024 best paper"
  - "[DONE] Confirm result \u2014 first practical (full) 31-step SHA-256 collision, 1.2h \u00d7 64 threads, negligible memory"
  - "[OPEN] Locate ePrint ID if assigned (paper may only be available via Springer proceedings)"
  - "[OPEN] If `block2_wang` activity restarts: study the memory-efficient search trick for adaptation to cascade-1 absorber search"
  owner: macbook
  last_updated: '2026-04-30'
