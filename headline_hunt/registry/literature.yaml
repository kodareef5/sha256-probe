- id: li_liu_wang_eurocrypt_2024_sha2_records
  citation: "Yingxin Li, Fukang Liu, Gaoli Wang \u2014 New Records in Collision Attacks on SHA-2"
  year: 2024
  venue: EUROCRYPT 2024 (Springer LNCS 14651)
  url: https://eprint.iacr.org/2024/349
  arxiv_or_eprint: ePrint 2024/349
  confidence: high
  relevance: Modern SHA-2 differential trail search via MILP + SAT/SMT. First practical
    semi-free-start (SFS) collision on 39-step SHA-256, beating the previous 38-step
    SFS record from Mendel-Nad-Schl\u00e4ffer (EUROCRYPT 2013). Direct methodology
    reference for block2_wang's stated dependency "Implement a bitcondition/trail-search
    engine (Wang-style, not just SAT)".
  read_status: read
  key_takeaway: |
    [STRUCTURAL_SUMMARY] Li-Liu-Wang (EUROCRYPT 2024) achieve 39-step SFS SHA-256
    collision via MILP-based differential characteristic search with SAT/SMT
    back-end. Authors explicitly state previous trail-search tools (de Canni\u00e8re-
    Rechberger-style automated DC) had hit a bottleneck \u2014 longer trails were not
    being found by improving heuristics alone. MILP relaxation gets past the
    plateau. Project context: this is "shallow-rounds full/SFS collisions" regime
    (24-39 steps); the project's sr=60/61 work is "deep-rounds cascade-1
    structural" regime \u2014 methodology largely disjoint, but MILP front-end is the
    documented working pattern for trail-class problems and should inform
    block2_wang if/when its trail-search engine is built.
