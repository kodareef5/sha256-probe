- id: singular_chamber_rank
  name: Lower-rank / finite-difference sr=61 defect chambers
  headline_if_success: Severe structural reduction of TRUE sr=61 cascade compatibility by targeting compressed schedule
    finite-difference plateaus aligned with fat carry-preimage buckets.
  hypothesis: The sr=61 schedule-defect map decomposes as D=S(W58)-R(W59); useful chambers occur when sparse-off58 forces
    a compressed S plateau that aligns with a fat R preimage bucket.
  structural_basis:
  - The current cascade proof establishes a 2^-32 barrier under apparent uniformity, not a formal lower bound on every local chamber.
  - For fixed W57, S(W58) = C + sigma1(W58 + off58) - sigma1(W58); reduced-N image can be far smaller than 2^N.
  - Iterative descent (linux ridge-repair/pooling + macbook M5 raw 1B-trial walks) drove the joint frontier from
    defect61 HW10/tail HW76 down to defect61 HW4/tail HW59 at full N=32.
  - Cross-candidate walks found exact D61 HW4 on idx0, idx8, and idx17, plus HW7 on idx3, so the low-D61 exact mechanism is not unique to idx8.
  - HW5/HW6 are dense at 1B trials (millions of hits each); the prior HW7 and HW5 'floors' were under-search artifacts.
  - Reduced-N exact fibers and full-N sparse-off58 steering show nonlinear carry chambers with fat preimages.
  - Exact defect60=0 synchronizes a,b,c,e at round 61, reducing required61 to dh+dCh and exposing a carry-repair wall.
  - Radius-6/radius-7 ridge enumeration finds low-D60 shelves with lower D61 than the exact frontier, including
    D60-HW7/D61-HW2 and HW5-local D60-HW7/D61-HW3 shelves.
  - Capped-D61 probing maps a stepped terrace: exact D60 at D61 HW5, D60 HW4 at D61 cap 4, and D60 HW7 at D61 cap 3/2.
  - Carry-coordinate comparison separates an exact-D60 Ch-only chart from a mixed Sigma1/Ch/T2 terrace chart.
  - A 64-flip mixed-seed pool did not bridge the mixed terrace back to exact D60; it returned to the known HW5/HW59 exact basins.
  - Deterministic full-kernel D60 repair-fiber sweeps over four low-D61 shelves, including an idx17 D61-HW1 shelf,
    found rare exact D60 landings but no exact low-cap representative.
  - OpenCL GPU W57/off58 scanning is available; additional HW1 off58 charts still do not predict the D61 floor by themselves.
  - W57-free beam and greedy probes create new exact-D60 landings and terraces, but lose the productive carry chart and do not improve D61 HW4 or tail HW59.
  status: in_flight
  priority: 8
  expected_info_per_cpu_hour: very_high
  dependencies:
  - Existing cascade-eligible candidate registry.
  - CPU C probes in bets/singular_chamber_rank/tools; OpenCL GPU chart scanner available for W57/off58 bulk discovery.
  next_action: "Build a carry-bit compensation operator for the mixed Sigma1/Ch/T2 shelves. Deterministic D60-fiber
    exhaustion and W57-free probes show exact D60 landings exist, but low-D61 caps are lost when the carry chart changes;
    new off58-HW1 charts confirm sparse offset alone is not the ranking function."
  kill_criteria:
  - All representative candidates plateau at the same defect61 floor across deep walks AND structural mapping fails to
    identify a carry-aware repair operator.
  - Reduced-N posterior carry filters fail to transfer into any pre-hit classifier on held-out chambers.
  reopen_criteria:
  - A nonlinear fiber-size probe shows nonuniform preimage size even when local rank is full.
  - A nonzero Ch/Maj-invisible trail construction gives a specific chamber to test.
  evidence:
  - bets/singular_chamber_rank/results/20260426_local_rank_probe.md
  - bets/singular_chamber_rank/results/20260426_fiber_count_probe.md
  - bets/singular_chamber_rank/results/20260426_schedule_finite_difference_probe.md
  - bets/singular_chamber_rank/results/20260426_fulln_sparse_offset_probe.md
  - bets/singular_chamber_rank/results/20260426_m5_1B_deep_descent.md
  - bets/singular_chamber_rank/results/20260426_m5_1B_from_HW5.md
  - bets/singular_chamber_rank/results/20260426_m5_3cand_HW5_reproduces.md
  - bets/singular_chamber_rank/results/20260426_HW4_D61_breakthrough.md
  - bets/singular_chamber_rank/results/20260426_HW4_idx17_third_cand.md
  - bets/singular_chamber_rank/results/20260426_cross_chamber_pool.md
  - bets/singular_chamber_rank/results/20260426_linux_hw4_gpu_followup.md
  - bets/singular_chamber_rank/results/20260426_d60_fiber_exhaustion.md
  - bets/singular_chamber_rank/results/20260426_w57_free_operator_probe.md
  owner: linux_gpu_laptop
  last_updated: '2026-04-26'
  notes: "Joint linux_gpu_laptop + macbook bet. Linux shipped the original mathematical decomposition, bridge enumeration,
    ridge analysis, and ridge-repair/pooling tooling; macbook M5 ran raw 1B-trial deep walks. Together: defect61 HW10 -> HW4,
    tail HW76 -> HW59 verified at full N=32. Cross-candidate walks reached idx0/idx8/idx17 HW4 and idx3 HW7. The exact
    surface is carry-fractured; capped-D61 probing found a D60-HW4/D61-HW4 terrace with no exact-D60 neighbor through
    radius 7, residual-fiber enumeration did not rescue it, deterministic D60-fiber exhaustion found no exact low-cap
    representative in four full 2^32 kernels including an idx17 D61-HW1 shelf, and 64-flip mixed-seed repair still returned to known exact basins.
    OpenCL GPU scans are working for W57/off58 chart discovery, but new HW1 off58 charts still did not beat the known frontier.
    W57-free beam/greedy probes add degrees of freedom but still lose the productive chart and do not improve D61 HW4/tail HW59.
    Open: carry-bit compensation or a productive-chart predictor?"
