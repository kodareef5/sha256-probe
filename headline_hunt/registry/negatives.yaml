- id: raw_carry_state_dp_near_injective
  claim: Raw carry-state DP provides no algorithmic speedup over brute force.
  scope: Cascade sr=60 search over all inputs; verified N=4 exhaustive.
  status: closed
  evidence_level: VERIFIED
  closed_date: '2026-04-15'
  evidence_files:
  - writeups/PROJECT_SUMMARY.md
  - q5_alternative_attacks/carry_state_width.c
  - q5_alternative_attacks/results/20260416_carry_elimination_negative.md
  why_closed: Carry-diff state width is 89-99% of full search space 2^{4N}. Bounded width applies only to collisions (solution
    set), not to the search space.
  would_change_my_mind:
  - A quotient state not based on raw carries gives >10x reduction at N=8 from scratch.
  - N=8 exact solver recovers 260 collisions with compact future-completion states.
  related_mechanisms:
  - chunk_mode_dp_with_modes
  owner: macbook
- id: gf2_linearization_carry_nonlinearity
  claim: GF(2) linearization of the collision function fails.
  scope: Cascade sr=60 at N=8; tested on 30+ slices.
  status: closed
  evidence_level: VERIFIED
  closed_date: '2026-04-12'
  evidence_files:
  - writeups/PROJECT_SUMMARY.md
  why_closed: Carry nonlinearity from modular additions is fundamental. 0/30 linear slices produce SAT; 90% of slices have
    power-of-2 collision counts but the function itself is not affine.
  would_change_my_mind:
  - A GF(2)-equivalent quotient that absorbs the carry structure (probably via a different group).
  related_mechanisms: []
  owner: macbook
