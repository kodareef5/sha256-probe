- id: bottom_up_sdd_blowup
  claim: Bottom-up SDD compilation has exponential intermediate blowup on cascade CNFs.
  scope: 'N=4 measured: 10.5GB SDD.'
  status: closed
  evidence_level: VERIFIED
  closed_date: '2026-04-14'
  evidence_files:
  - writeups/PROJECT_SUMMARY.md
  why_closed: 'Pure incremental BDD/SDD Apply has exponential intermediate blowup even though the final BDD is polynomial.
    This is the polynomial-BDD-paradox: the compact representation exists but bottom-up construction does not reach it.'
  would_change_my_mind:
  - An SDD vtree with custom learning that aligns with cascade structure and stays polynomial through Apply.
  - A top-down construction (e.g., d-DNNF via DPLL caching) that avoids Apply blowup.
  related_mechanisms:
  - d4_xor_preprocessing
  owner: macbook
