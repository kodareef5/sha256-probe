  observed_n_kernels: 24
  observed_vars: [12540, 13256]   # before / after modular-diff aux added
  observed_clauses: [52454, 54947]
  last_audited: "2026-04-28"
  notes: "2026-04-28 re-audit: 60 sr60 expose CNFs in cascade_aux/cnfs/ (largest bucket), 24 distinct kernel-bits. Empirical range [12540,13256] / [52454,54947] within fingerprint envelope."

