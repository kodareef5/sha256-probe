# cascade-aux encoder fingerprints (bets/cascade_aux_encoding/encoders/cascade_aux_encoder.py).
# Observed sizes 2026-04-24 on macbook:
#   sr=60 aux (both modes): 12620 vars / 52783 clauses (candidate 0x17149975/0xff/bit31)
#   sr=61 aux (both modes): 12816 vars / 53698 clauses (candidate 0x3304caa0/0x80000000/bit10)
# Ranges below must NOT overlap between sr-levels (that would trigger spurious
# CROSS_SR_MATCH disasters). Tight ranges will miss aux CNFs built for very different
# candidate/fill/kernel combos — expand per observation as new candidates are tried.
- bucket_id: sr60_n32_cascade_aux_expose
  sr_level: 60
  n: 32
  encoder_variant: "cascade_aux_expose"
  vars_range: [12450, 12700]
  clauses_range: [52400, 53100]
  example_file: "headline_hunt/bets/cascade_aux_encoding/cnfs/aux_expose_sr60_n32_bit31_m17149975_fillffffffff.cnf"
  observed_n_kernels: 9
  observed_vars: [12540, 12620]
  observed_clauses: [52454, 52783]
  last_audited: "2026-04-25"

