reopen_candidate_2026_04_29_F326_sharpened: |
  F326 cross-cand validation (cascade_aux_encoding) confirms the 132-bit
  universal hard core is a CDCL-search invariant of the cascade-1
  collision problem, NOT an encoder Tseitin artifact (F324: 0/32 W2_58
  bits UP-forced; F325: 0/496 pairs UP-UNSAT; F326: pattern identical
  across 6 cands).

  This sharpens the propagator design: the structural bottleneck is
  CDCL trajectory through these 132 bits. cb_decide priority + clause
  pre-loading directly target the bottleneck. cb_propagate is no longer
  recommended (encoder doesn't pin the bits via UP, so propagator can't
  either — soundness constraint).

  Reopen now requires only: ≥1 day implementation cycle for Phase 2D+2D'.
  Empirical demand: yes — F326 motivated by 132-bit-bottleneck thesis.
  Awaiting compute decision from user (this is a multi-hour build,
  bigger than routine work).
reopen_candidate_2026_04_28: |
  Yale's F123/F125 (block2_wang) finding (2026-04-28): block-2 absorber
  candidates are STRICT radius-2 local minima even under common-mode
  flips. All bit-flip directions exhausted. Yale's stated next step:
  "structured moves that preserve late-schedule features, OR a solver
  that reasons directly over schedule words W16-W30 instead of raw
  message-bit flips."

  This is precisely what the propagator was built for. The bet's
  existing 1310 LOC + IPASIR-UP infrastructure + Rule 4-5 substrate
  could be repurposed for yale's structured-search needs.

  Concrete reopen path (if yale escalates demand):
  - Connect propagator to block2_wang absorber search loop
  - Use propagator's bit-tracking substrate to enforce schedule
    constraints during local search (escape radius-2 minima via
    propagation rather than enumeration)
  - Test on yale's score-86 fixture: does propagator-guided search
    find lower-score absorbers than pure simulated annealing?

  Also connects to principles framework's BP-Bethe synthesis (synthesis
  8 + F134-F139 calibration on cascade_aux N=32): the propagator IS a
  bespoke message-passing engine on cascade-1's Tanner graph. BP-Bethe
  is a poly-time algorithmic alternative.

  Bet stays closed until yale or another machine articulates a specific
  use case demand. F123/F125 + this entry document the reopen-candidate
  context.
