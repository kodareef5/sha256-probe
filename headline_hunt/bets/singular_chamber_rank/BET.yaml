current_progress: |
  Joint linux_gpu_laptop + macbook campaign. The full-N sparse-off58 chamber
  at idx 8 (off58=0x00010002) has moved from initial exact sr=61 compatibility
  through HW10/HW76, HW8/HW74, HW7/HW70, and now M5 1B-trial HW5 round-61 /
  tail-HW67 verified frontiers.

  The HW7 floor was an under-search artifact; HW5/HW6 are dense at 1B trials.
  Local radius-7 enumeration found a D60-HW7/D61-HW2 shelf, and weighted ridge
  repair found an exact HW6 basin. Around the M5 HW5 point, capped-D61 probing
  now maps a stepped terrace: cap 5 returns the known exact HW5 point, cap 4
  bottoms at D60-HW4/D61-HW4, and cap 3/2 bottom at D60-HW7. Radius-7
  enumeration around the HW4/HW4 terrace checked 704M neighbors with no exact
  D60 point. A later M5 1B walk from the HW5 base found no D61 HW4/HW3, but
  improved checked tail to HW67. Open question: can carry-aware repair close
  those four D60 bits while preserving the D61 cap-4 terrace?
