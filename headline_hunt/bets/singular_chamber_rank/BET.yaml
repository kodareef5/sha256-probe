id: singular_chamber_rank
mechanism_id: singular_chamber_rank
name: Lower-rank / finite-difference sr=61 defect chambers
headline_if_success: Severe structural reduction of TRUE sr=61 cascade compatibility by targeting compressed schedule finite-difference plateaus aligned with fat carry-preimage buckets.
hypothesis: The sr=61 schedule-defect map can be decomposed into a compressed schedule finite-difference target S(W58) and a round-required image R(W59); useful chambers occur when S plateaus align with fat R preimage buckets.
structural_basis:
  - The current cascade proof establishes a 2^-32 barrier under apparent uniformity, not a formal lower bound on every local chamber.
  - Ch and Maj have exact invisible directions on surfaces such as f=g and b=c.
  - Fill-specific candidate yield suggests carry chambers are shaped by boundary constants.
  - For fixed W57, S(W58) = C + sigma1(W58 + off58) - sigma1(W58), whose reduced-N image can be far smaller than 2^N.
status: in_flight
priority: experimental
expected_info_per_cpu_hour: high
dependencies:
  - Existing cascade-eligible candidate registry.
  - CPU-only C probes; GPU optional once a rank/drop signal exists.
next_action: "Continue from the M5 HW5/tail-HW68 frontier (cddef23) with carry-aware repair. Yale's radius-7 enumeration found a D60-HW7/D61-HW2 shelf, but ordinary Newton/greedy repair loses the D61 gain. M5 1B-trial walks reach D61=HW5 directly; next is whether HW4/HW3 are reachable from the new HW5 base."
kill_criteria:
  - No local defect-rank drop below 32 across representative candidates and structured fills.
  - No correlation between gate-degeneracy metrics and defect-rank or defect-HW after a bounded probe.
  - No reusable predictor for S/R alignment beyond posterior reduced-N filters.
reopen_criteria:
  - A nonlinear fiber-size probe shows nonuniform preimage size even when local rank is full.
  - A nonzero Ch/Maj-invisible trail construction gives a specific chamber to test.
