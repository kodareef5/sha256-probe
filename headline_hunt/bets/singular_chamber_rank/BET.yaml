notes: |
  Local rank stayed full, so the bet redirected toward nonlinear
  finite-difference/carry fibers. Full-N sparse off58 steering found multiple
  exact sr=61-compatible points with defect60=0. Iterative descent, combining
  linux ridge-repair and M5 raw 1B-trial walks, drove the joint frontier from
  defect61 HW10 / tail HW76 through HW8/HW74 and HW7/HW70 to defect61 HW4 /
  tail HW59. Cross-candidate walks found idx0 and idx17 exact D61 HW4 and
  idx3 exact D61 HW7, showing the low-D61 exact mechanism is not unique to
  idx8 and that even the sparsest known off58 chart still floors at HW4 under
  the current operator.

  Round61 traces show exact defect60 synchronizes a,b,c,e, reducing required61
  to dh+dCh. Radius-7 enumeration revealed a D60-HW7/D61-HW2 shelf that ordinary
  Newton/greedy repair cannot land exactly; weighted ridge repair can find nearby
  exact HW6. A capped-D61 objective exposed a cleaner D60-HW4/D61-HW4 terrace,
  but pair-residual linear solves still leave the carry chamber, and no exact
  D60 point appeared within radius 7 of the terrace. Residual-fiber
  enumeration did not find a better representative inside the pair-linear
  affine fibers, and deterministic D60-fiber exhaustion found no exact
  low-cap representative in four full 2^32 kernel sweeps, including the idx17
  D61-HW1 shelf. GPU W57/off58 scans can find sparse charts quickly, but
  additional HW1 off58 charts only reached D61 HW7/HW13/HW16 under current
  descent; downstream carry geometry selects the productive charts. W57-free
  beam/greedy probes add degrees of freedom but mostly leave the sparse/carry
  chart and do not improve the known frontiers. W57-free affine-fiber probes
  reduce D60 to HW1, but D61 rises to double digits and exact D60 remains
  absent in sampled/low-weight checks. W57-free chart walks over idx0/idx8
  exact HW4 points found millions of exact-D60 landings but no exact D61 HW3;
  the HW3 shelves require large off58/off59 and round-61 carry-chart changes.
  Macbook's F12 residual-grid candidates were added and scanned with the GPU:
  their F12 min-W57 chambers do not transfer directly to singular off58, but
  direct GPU off58 scans found sparse charts. The best downstream result was
  bit17_m427c281d_80 at exact D61 HW6/tail-HW67, still below the current
  HW4/tail-HW59 frontier.
  Carry-coordinate comparison indicates this terrace is
  a mixed Sigma1/Ch/T2 chart, not a small move along the exact-D60 Ch-only
  chart.
