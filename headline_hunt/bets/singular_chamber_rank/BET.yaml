milestone_marker: hit_sr61_barrier
current_progress: |
  Joint linux_gpu_laptop + macbook campaign. The full-N sparse-off58 chamber
  at idx 8 (off58=0x00010002) has moved from initial exact sr=61 compatibility
  through HW10/HW76, HW8/HW74, HW7/HW70, HW5/tail-HW67, and now pooled
  exact-surface tail-HW59 verified frontiers.

  The HW7 and HW5 floors were under-search artifacts; macbook found exact
  D61 HW4 on idx0, verified locally.
  HW5/HW6 are dense at 1B trials.
  Local radius-7 enumeration found a D60-HW7/D61-HW2 shelf, and weighted ridge
  repair found an exact HW6 basin. Around the M5 HW5 point, capped-D61 probing
  now maps a stepped terrace: cap 5 returns the known exact HW5 point, cap 4
  bottoms at D60-HW4/D61-HW4, and cap 3/2 bottom at D60-HW7. Radius-7
  enumeration around the HW4/HW4 terrace checked 704M neighbors with no exact
  D60 point. A later M5 1B walk from the idx8 HW5 base found no D61 HW4/HW3,
  but improved checked tail to HW67, then a linux pooled walk improved idx8's
  checked tail to HW59. Cross-candidate walks now show the mechanism is not
  unique to idx8: idx0 and idx17 reach exact D61 HW4, while idx3 reaches
  exact D61 HW7.
  A linux 1B follow-up from the idx0 HW4 point did not find HW3, but improved
  idx0 checked tail to HW66. Residual-fiber enumeration and 64-flip mixed-seed
  pooling did not bridge the cap terrace back to exact D60. Deterministic
  2^32 D60-kernel sweeps over the HW2 shelf, cap-4 terrace, a local
  HW3 shelf, and the idx17 D60-HW7/D61-HW1 shelf found rare exact D60
  landings, but zero exact low-cap representatives. OpenCL GPU W57 scans found
  new off58-HW1 charts on idx9/13/14/15, but deeper CPU walks showed off58
  sparsity alone is not the ranking function. W57-free beam and greedy probes
  found new exact-D60 landings and non-exact terraces, but did not improve
  D61 HW4 or tail HW59. W57-free affine-fiber sampling and low-weight kernel
  enumeration reached D60-HW1 but found no exact D60 and no cap-preserving
  bridge. W57-free chart walks over the exact HW4 bases found more than 2.4M
  exact-D60 points across 200M trials, but every exact point stayed at D61
  HW4 or worse; D61 HW3 appears only on non-exact shelves.
  Carry-coordinate comparison
  shows exact HW5/HW67 basin moves are round-61 Ch-only, while the cap-4
  terrace lowers D61 by activating Sigma1/T2 terms outside the exact-D60 chart.
  Open question: can a compensation operator preserve those mixed terms while
  closing D60?
