notes: Local rank stayed full, so the bet redirected toward nonlinear finite-difference/carry fibers. Full-N sparse off58 steering found multiple exact sr=61-compatible points with defect60=0; selecting among exact hits reduced the next round-61 defect to HW11 and the checked 57..63 tail to HW82. Round61 manifold probes show rank63 pair tangents and rank31 on the defect60 kernel, while sparse off59 sheets are reachable but not sufficient; the remaining wall is a nonlinear carry-chamber transition.
