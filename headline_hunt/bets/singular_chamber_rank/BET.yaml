  - results/20260426_fiber_count_probe.md
  - results/20260426_schedule_finite_difference_probe.md
  - results/20260426_fulln_sparse_offset_probe.md
notes: Local rank stayed full, so the bet redirected toward nonlinear finite-difference/carry fibers. Full-N sparse off58 steering found multiple exact sr=61-compatible points with defect60=0; selecting among exact hits reduced the next round-61 defect to HW11 and the checked 57..63 tail to HW82. Round61 traces show exact defect60 synchronizes a,b,c,e, reducing required61 to dh+dCh; high-Hamming Newton corrections turn dSigma1/dT2 back on and cross carry chambers. Sparse off59 sheets are reachable but not sufficient. Newton projection is only local, while greedy one-bit repair can cross exact basins; current neighboring basins do not beat HW11.
