    - prototypes/hard_residue_analyzer.py: per-bit bias analysis at rounds 60/63.

  Empirical results:
    - Forward residue distribution: HW(da||db||dc||dd) at round 63 is mean 48
      (skewed left vs uniform 64 — cascade structure visible).
      [results/20260424_forward_residue_distribution.md]
    - Cross-candidate residue distribution is candidate-independent: median 48
      for all 7 candidates tested.
      [results/20260424_cross_candidate_sweep.md]
    - Round-60 hard residue identified: ~24 uniform bits per candidate (range
      17-28), localized to register g60 (12-21 bits), f60 (3-4 bits), h60 (2-5
      bits). a60-e60 always cascade-zero (160 bits guaranteed).
      [results/20260424_hard_residue_findings.md]
    - Cross-candidate hard-bit POSITIONS are NOT shared (Jaccard 0.08-0.47;
      zero bits uniform across all 6 candidates). Forward MITM table is
      per-candidate (~17GB at 2^26 entries), NOT amortizable across candidates.
      [results/20260424_cross_candidate_hard_bit_positions.md]

  Bet status: hypothesis size-correct (~24 bits) and locality-correct
  (g60-dominant). Amortization assumption refuted: tables don't share across
  candidates. Single-candidate MITM remains strongly viable; ~17GB table.

