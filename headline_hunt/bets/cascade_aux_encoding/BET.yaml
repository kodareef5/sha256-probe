current_progress: |
  CLAIMED by macbook 2026-04-24 as first-worker bet.

  Phase 1 (SPEC) — DONE: encoders/SPEC.md defines the auxiliary variable set,
    expected treewidth impact, and the additive-only design principle.
  Phase 2 (ENCODER) — INITIAL: encoders/cascade_aux_encoder.py wraps the
    existing lib/cnf_encoder.CNFBuilder and emits the aux variables + tying
    clauses on top of a standard cascade CNF. Emits DIMACS to stdout or file.
  Phase 3 (TREEWIDTH) — OPEN: Next worker to run FlowCutter on matched pairs
    of standard vs aux CNFs at N=8, N=10, N=12. Target: aux tw < standard tw.
  Phase 4 (SAT COMPARISON) — OPEN: Next worker to run Kissat with multiple
    seeds on TRUE sr=61 N=10 instances (standard vs aux encoding) and compare
    conflict counts + wall time. Log every run via infra/append_run.py.
  STRUCTURAL HOOK AVAILABLE (2026-04-25, from mitm_residue): Six modular
  constraints + two zero-diffs at r ∈ {61,62,63} are now empirically locked
  (60,000+ cross-kernel checks, 9 families). Specifically:
    R63.1  dc_63 ≡ dg_63           — adds 32 bit-equality clauses
    R63.3  da_63 − de_63 ≡ dT2_63  — adds modular sum + Sigma0/Maj sub-network
  These could be added as HINT CLAUSES in a Mode A+ variant (no solution-space
  restriction; just structural propagation acceleration). Worth a comparative
  pilot at small N if/when an N=8 encoder is rebuilt.

  Mode B's existing dE[61..63]=0 + dA[61]=dE[61] already implies these in the
  collision-finding context, so adding them is redundant for Mode B. The
  potential benefit is for non-Mode-B usage where structural propagation
  accelerates discovery without forcing the cascade interpretation.

  COMPREHENSIVE EMPIRICAL FINDINGS (2026-04-25 macbook session):
  - 36 cross-kernel CNFs generated (9 kernels × sr=60/61 × expose/force).
    Reproducible via cnfs/regenerate.sh, all audit-CONFIRMED.
  - Mode B is FRONT-LOADED 2-3.4x faster per conflict at small budgets:
      kissat 50k:  2.0x speedup, CV=0.000 across 5 seeds
      cadical 50k: 3.4x speedup, consistent across 8 enf0 kernels
  - The advantage ERODES at higher budgets:
      kissat 500k:  1.0-1.1x  (steady-state convergence)
      cadical sr=60 1M: 1.08x
  - Mode A (expose) is consistently SLOWER than standard on cadical
    (8.5s vs 4.2s mean) — anti-recommend on cadical.
  - Mode B benefit comes from preprocessing: ~3000 cascade-zero unit
    clauses give a one-time speedup; CDCL's steady-state cost normalizes
    across encodings after warmup.

  NEGATIVE: sr=59 SANITY PROBE (2026-04-25):
  - 28 runs (cadical + kissat) at sr=59 cascade-DP, 1M-10M conflict budgets,
    37M total conflicts: ZERO SAT.
  - Cascade-DP sr=59 is structurally HARDER than naive bit-counting suggests
    (5 free W's × 32 = 160 bits, 4 d.o.f. × 32 = 128 constraint bits, naive
    count predicts 2^32 SAT solutions; CDCL navigation cost is much higher).
  - Important: our encoder's "sr=59" ≠ Viragh's sr=59. Ours = 5-W-freedom +
    full 63-round collision; Viragh's = 59-round-truncated SHA-256.

  REVISED HEADLINE-HUNT POSTURE: The original SPEC's "≥10x SAT speedup"
  claim is empirically refuted at all tested budgets. Mode B is a useful
  2-3.4x preprocessing tool, not a path to cascade-DP SAT discovery. Path
  forward to a headline at any sr-level requires:
    (1) different message-difference structure (block2_wang Wang trails),
    (2) a propagator that navigates the modular variety more efficiently
        than CDCL alone (programmatic_sat_propagator bet — SPEC + Phase 1
        + varmap bridge all shipped today; Phase 2B C++ engineering ready),
    (3) genuinely-multi-day compute on a single instance.

