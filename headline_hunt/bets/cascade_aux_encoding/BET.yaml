  WHAT THE SPEEDUP MEANS:
    Mode A cascade_aux CNFs preserve the standard encoding's solution
    set (sr=61 collision iff one exists). Stack hints fix de58/de59
    to chamber-specific NON-ZERO values, which contradicts the
    de58=de59=0 needed for collision — so SAT-side they over-restrict.
    The 50k speedup is in proving "no collision in this chamber"
    faster (chamber-elimination triage), not finding collisions.

