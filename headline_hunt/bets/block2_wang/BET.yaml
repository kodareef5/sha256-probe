  Verdict: F408 HW=45 is a robust local HW optimum. Bridge_score's
  structural reward terms (c/g asymmetry, dominator bits) reward a
  different geometry than raw HW. Wider search radius or a directly-HW
  objective is the next experiment to break HW<45.

