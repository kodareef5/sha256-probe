recent_progress_2026-04-27_PM: |
  Major mid-day shipping: F31-F36 cross-bet structural cascade results.

  F31 (corpus extension): bit2_ma896ee41 (PRIMARY) + bit13_m4e560940
  (SECONDARY) corpora at 1M samples. Each ~18k records HW≤80.
  Confirms F28 ranking persists at moderate budgets.

  F32 (deep corpus structured): F28_registry_1B archive parsed into
  3,065-record JSONL covering all 67 cands. Cross-validates F28 exactly
  (11 exact-symmetry cands at min HW, bit2 HW=45 a_61=e_61=0x02000004,
  etc.). bit2_ma896ee41 deep-min vector + W-witness now queryable.

  F34 (active-adder cascade-invariant): EXACTLY 43 active modular adders
  at every cand's deep-min residual. Universal cascade-1 structural
  property: 49 max - 6 saved (rounds 59-61 Σ0+Maj/T2/e' inactive due
  to cascade zeros) = 43.

  F35 (per-cand LM cost): Lipmaa-Moriai sum varies 90 bits across 11
  exact-symmetry cands, 117 bits across all 67. Real metric distinct
  from active count.

  F36 (universal LM compatibility): ALL 67 cascade-1 trails have ZERO
  LM-violating adders. Cascade isn't just an empirical low-HW sieve —
  it's a STRUCTURE-PRESERVING construction producing XOR-consistent
  trails. msb_ma22dc6c7 is global LM champion at 773 (NOT in F28's
  exact-symmetry list, missed by HW+sym filter).

  F42/F43 (all-record LM + Pareto surface): macbook extended LM
  compatibility to all 3,065 F28 records with 0 incompatibilities.
  linux_gpu_laptop joined those costs back to the witness corpus and
  found only 5 global Pareto points on (HW, LM). The record-wise LM
  champion is bit4_m39a03c2d at HW53/LM757, 16 LM bits below the prior
  min-HW-record LM champion. The lowest-LM exact-symmetry record is also
  bit4 (HW52/LM772). Candidate selection is now explicitly 3-axis:
  residual HW, LM cost, and exact a61=e61 symmetry.

  F45 (online Pareto sampler): linux_gpu_laptop built a C sampler that
  scores HW, LM, and symmetry online instead of keeping only min-HW
  records. Matched 100B random runs stabilized at bit28 HW73/LM718 and
  bit4 HW71/LM720, but seeded point-walk from bit28 then moved the raw
  LM frontier to HW55/LM675 and exact-symmetry LM to HW55/LM688. The
  same local basin also found a bit28 HW45 residual (LM763), tying the
  global bit2 HW record at lower LM but without exact symmetry. This
  confirms the LM tail was underexplored by min-HW corpus collection and
  is locally navigable under targeted bit flips.

  Tools shipped:
    parse_F28_archive.py      — corpus enrichment from F28 logs
    active_adder_count.c      — verified, reproduces F32 exactly
    active_adder_lm_bound.c   — per-adder Lipmaa-Moriai costing
    cand_select.py            — multi-metric cand ranking utility
    trails/scan_record_lm.py  — all-record LM/HW Pareto extractor
    trails/block2_pareto_sampler.c — online HW/LM/symmetry sampler
    F28_deep_corpus_enriched.jsonl — 3065 records + LM/active fields

  For paper Section 5: F34 (universal-43) + F36 (universal-LM-compat)
  are the two strongest publishable structural cascade-1 claims. F43
  supplies the concrete target set for block2 trail design: bit2, bit13,
  msb_ma22dc6c7, bit28, and bit4.


